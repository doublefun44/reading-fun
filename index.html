<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- iOS PWA:全屏、没有地址栏 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Reading RPG">

<!-- 主题色(状态栏/任务切换时的颜色) -->
<meta name="theme-color" content="#1a1a2e">
  <title>Reading RPG
  </title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<main class="container">
  <h1>Reading RPG</h1>

  <!-- 列表态 -->
<section id="listView">
  <div id="todayStats" class="today-stats"></div>
  <section id="bookList" class="book-list"></section>
  <button id="addBookBtn" class="btn btn-primary">+ 添加书</button>
  <section id="sessionList" class="session-list"></section>
</section>

  <!-- 计时态 -->
<section id="timerView" class="hidden">
  <div id="currentBookTitle" class="current-book"></div>
  <div id="timer" class="timer">00:00</div>
  <button id="stopBtn" class="btn btn-secondary">停止</button>
</section>

<section id="progressView" class="hidden">
  <div id="progressBookTitle" class="current-book"></div>
  <div id="progressDuration" class="progress-duration"></div>
  <label class="progress-label">
    读到多少 %?
    <input type="number" id="progressPercent" min="0" max="100" placeholder="留空 = 不更新">
  </label>
  <div class="progress-actions">
    <button id="skipProgressBtn" class="btn btn-secondary">跳过</button>
    <button id="saveProgressBtn" class="btn btn-primary">保存</button>
  </div>
</section>
</main>

  <!-- 添加书的 modal -->
  <div id="addBookModal" class="modal hidden">
    <div class="modal-content">
      <h2>添加新书</h2>
      <label>
        书名 <span class="required">*</span>
        <input type="text" id="bookTitle" placeholder="例:三体">
      </label>
      <label>
        封面 URL
        <input type="url" id="bookCover" placeholder="选填,粘贴图片链接">
      </label>
      <label>
        当前进度(%)
        <input type="number" id="bookPercent" min="0" max="100" value="0">
      </label>
      <div class="modal-actions">
        <button id="cancelBookBtn" class="btn btn-secondary">取消</button>
        <button id="saveBookBtn" class="btn btn-primary">保存</button>
      </div>
    </div>
  </div>

  <!-- 计时器我们暂时藏起来,下一块再接回来 -->

  <script src="storage.js"></script>
  <script src="app.js"></script>
</body>
</html>
